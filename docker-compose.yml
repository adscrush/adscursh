services:
  postgres:
    image: postgres:16-alpine
    container_name: adscrush-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: adscrush
      POSTGRES_USER: adscrush
      POSTGRES_PASSWORD: adscrush
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adscrush"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
